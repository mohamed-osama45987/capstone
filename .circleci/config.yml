version: 2.1

orbs:
  node: circleci/node@5.0.1
  maven: circleci/maven@2.0.0

jobs:
  frontend-test-build:
    docker:
      - image: cimg/node:20.8
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-frontend-node-modules-{{ checksum "frontend/package-lock.json" }}
      - run:
          name: Install frontend dependencies
          command: |
            cd frontend
            npm install
      - save_cache:
          paths:
            - frontend/node_modules
          key: v1-frontend-node-modules-{{ checksum "frontend/package-lock.json" }}
      - run:
          name: Run frontend lint and test
          command: |
            cd frontend
            npm run build

  backend-test-build:
    docker:
      - image: cimg/openjdk:21.0
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-backend-m2-{{ checksum "backend/pom.xml" }}
      - run:
          name: Build backend
          command: |
            cd backend
            mvn -B clean package -DskipTests
      - save_cache:
          paths:
            - ~/.m2/repository
          key: v1-backend-m2-{{ checksum "backend/pom.xml" }}

  docker-publish:
    machine:
      enabled: true
    steps:
      - checkout
      - run:
          name: Log in to Docker Hub
          command: |
            echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - run:
          name: Build and push backend image
          command: |
            docker build -t $DOCKERHUB_USERNAME/capstone-backend:latest backend
            docker tag $DOCKERHUB_USERNAME/capstone-backend:latest $DOCKERHUB_USERNAME/capstone-backend:$CIRCLE_SHA1
            docker push $DOCKERHUB_USERNAME/capstone-backend:latest
            docker push $DOCKERHUB_USERNAME/capstone-backend:$CIRCLE_SHA1
      - run:
          name: Build and push frontend image
          command: |
            docker build -t $DOCKERHUB_USERNAME/capstone-frontend:latest frontend
            docker tag $DOCKERHUB_USERNAME/capstone-frontend:latest $DOCKERHUB_USERNAME/capstone-frontend:$CIRCLE_SHA1
            docker push $DOCKERHUB_USERNAME/capstone-frontend:latest
            docker push $DOCKERHUB_USERNAME/capstone-frontend:$CIRCLE_SHA1

  render-deploy:
    machine:
      enabled: true
    steps:
      - checkout
      - run:
          name: Trigger Render deploys
          command: |
            if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_BACKEND_SERVICE_ID" ] || [ -z "$RENDER_FRONTEND_SERVICE_ID" ] || [ -z "$RENDER_POSTGRES_SERVICE_ID" ]; then
              echo "Missing required Render environment variables"
              exit 1
            fi
            for service_id in "$RENDER_BACKEND_SERVICE_ID" "$RENDER_FRONTEND_SERVICE_ID" "$RENDER_POSTGRES_SERVICE_ID"; do
              echo "Triggering Render deploy for $service_id"
              curl -X POST "https://api.render.com/v1/services/$service_id/deploys" \
                -H "Authorization: Bearer $RENDER_API_KEY" \
                -H "Content-Type: application/json" \
                -d '{}'
            done

workflows:
  build-and-test:
    jobs:
      - frontend-test-build
      - backend-test-build
      - docker-publish:
          requires:
            - frontend-test-build
            - backend-test-build
      - render-deploy:
          requires:
            - docker-publish
