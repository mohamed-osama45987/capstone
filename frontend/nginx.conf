server {
  listen 80;
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # In Render, the frontend and backend run as separate services.
  # The frontend app should call the backend via its public URL,
  # not via the internal Docker hostname "backend".
  # Build the frontend with VITE_API_URL pointing to the backend URL.
}
