spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:eventdb}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  # H2 configuration for tests (activated by test profile)
  profiles:
    active: dev

flyway:
  enabled: true
  locations: classpath:db/migration
  baseline-on-migrate: true

logging:
  level:
    root: INFO
    org.springframework.web: DEBUG